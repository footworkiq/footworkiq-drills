name: Rebuild Index

on:
  push:
    branches: [main]
    paths:
      - 'drills/**'

jobs:
  rebuild-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build index.json
        run: node scripts/build-index.js
      - uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore: rebuild index.json [skip ci]"
          file_pattern: "index.json"
